services:
  - type: web
    name: welfare-backend
    plan: free
    env: node
    buildCommand: "cd server && npm install"
    startCommand: "cd server && npm run start:prod"
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
